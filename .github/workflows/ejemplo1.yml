name: Ejemplo de CI - Springboot
on:
  push:
    branches: [main]
  pull_request:
jobs:
  compilar:
    runs-on: ubuntu-latest
    steps:
      - name: Clonando mi repositorio
        uses: actions/checkout@v3
      - name: Configurando JDK 25
        uses: actions/setup-java@v5.2.0
        with:
          java-version: '25'
          distribution: 'temurin'
      - name: Compilando mediante Maven
        run: mvn clean install